<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__TITLE__</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      /* ===================== THEMES ===================== */

      :root, body.manuscript {
        --font-body: Georgia, 'Times New Roman', serif;
        --font-heading: Georgia, 'Times New Roman', serif;
        --font-mono: 'IBM Plex Mono', 'SF Mono', Menlo, monospace;
        --font-label: Georgia, 'Times New Roman', serif;
        --font-size: 17px;
        --line-height: 1.7;
        --max-width: 780px;
        --bg: #FAF8F5;
        --surface: #FFFFFF;
        --surface-2: #F5F2ED;
        --text: #2C2C2C;
        --text-muted: #6B6B6B;
        --accent: #1A5276;
        --accent-soft: rgba(26, 82, 118, 0.07);
        --border: #E8E4DF;
        --border-strong: #C8C2B8;
        --positive: #2E7D57;
        --negative: #9B3B3B;
        --warning: #8B6914;
        --highlight: transparent;
        --radius: 0;
        --radius-lg: 0;
        --shadow: none;
        --heading-weight: 700;
        --heading-transform: none;
        --label-transform: normal;
        --label-tracking: 0;
        --label-size: 0.82rem;
        --label-weight: 600;
        --rule-weight: 1px;
        --spacing: 2.5rem;
      }

      body.linear {
        --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        --font-heading: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        --font-mono: 'SF Mono', 'Fira Code', Consolas, monospace;
        --font-label: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        --font-size: 15px; --line-height: 1.55; --max-width: 1000px;
        --bg: #131316; --surface: #1C1C21; --surface-2: #25252B;
        --text: #EDEDEF; --text-muted: #8B8B93;
        --accent: #7C6AEF; --accent-soft: rgba(124, 106, 239, 0.1);
        --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.14);
        --positive: #3ECF8E; --negative: #EF4444; --warning: #F5A623;
        --highlight: transparent;
        --radius: 10px; --radius-lg: 14px; --shadow: none;
        --heading-weight: 600; --heading-transform: none;
        --label-transform: uppercase; --label-tracking: 0.06em;
        --label-size: 0.7rem; --label-weight: 600;
        --rule-weight: 1px; --spacing: 1.75rem;
      }

      body.swiss {
        --font-body: Helvetica Neue, Helvetica, Arial, sans-serif;
        --font-heading: Helvetica Neue, Helvetica, Arial, sans-serif;
        --font-mono: 'Courier New', Courier, monospace;
        --font-label: Helvetica Neue, Helvetica, Arial, sans-serif;
        --font-size: 16px; --line-height: 1.5; --max-width: 1080px;
        --bg: #FFFFFF; --surface: #F5F5F5; --surface-2: #EEEEEE;
        --text: #0A0A0A; --text-muted: #555555;
        --accent: #E63B2E; --accent-soft: rgba(230, 59, 46, 0.06);
        --border: #DDDDDD; --border-strong: #0A0A0A;
        --positive: #1B7A3D; --negative: #E63B2E; --warning: #CC8800;
        --highlight: transparent;
        --radius: 0; --radius-lg: 0; --shadow: none;
        --heading-weight: 700; --heading-transform: none;
        --label-transform: uppercase; --label-tracking: 0.12em;
        --label-size: 0.68rem; --label-weight: 600;
        --rule-weight: 2px; --spacing: 2rem;
      }

      body.academic {
        --font-body: 'Times New Roman', Times, Georgia, serif;
        --font-heading: 'Times New Roman', Times, Georgia, serif;
        --font-mono: 'Courier New', Courier, monospace;
        --font-label: 'Times New Roman', Times, Georgia, serif;
        --font-size: 16px; --line-height: 1.55; --max-width: 860px;
        --bg: #FFFFFF; --surface: #F8F8F8; --surface-2: #F0F0F0;
        --text: #1A1A1A; --text-muted: #4A4A4A;
        --accent: #1A3C6E; --accent-soft: rgba(26, 60, 110, 0.06);
        --border: #D0D0D0; --border-strong: #999999;
        --positive: #2E6B3A; --negative: #8B2500; --warning: #8B6914;
        --highlight: #FFF3CD;
        --radius: 0; --radius-lg: 0; --shadow: none;
        --heading-weight: 700; --heading-transform: none;
        --label-transform: normal; --label-tracking: 0;
        --label-size: 0.82rem; --label-weight: 700;
        --rule-weight: 1px; --spacing: 1.75rem;
      }

      body.stripe {
        --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        --font-heading: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        --font-mono: 'SF Mono', 'Fira Code', Consolas, monospace;
        --font-label: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        --font-size: 15px; --line-height: 1.6; --max-width: 1020px;
        --bg: #F6F8FA; --surface: #FFFFFF; --surface-2: #F0F2F5;
        --text: #1A1F36; --text-muted: #697386;
        --accent: #635BFF; --accent-soft: rgba(99, 91, 255, 0.06);
        --border: #E3E8EE; --border-strong: #C1C9D2;
        --positive: #0DAC5C; --negative: #CD3D64; --warning: #F5A623;
        --highlight: transparent;
        --radius: 10px; --radius-lg: 14px;
        --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 3px 10px rgba(0,0,0,0.03);
        --heading-weight: 600; --heading-transform: none;
        --label-transform: uppercase; --label-tracking: 0.04em;
        --label-size: 0.72rem; --label-weight: 600;
        --rule-weight: 1px; --spacing: 1.75rem;
      }

      body.brutalist {
        --font-body: Georgia, 'Times New Roman', serif;
        --font-heading: 'Arial Black', Impact, 'Helvetica Neue', Arial, sans-serif;
        --font-mono: 'Courier New', Courier, monospace;
        --font-label: 'Courier New', Courier, monospace;
        --font-size: 17px; --line-height: 1.55; --max-width: 1000px;
        --bg: #FFFFFF; --surface: #F0F0F0; --surface-2: #E4E4E4;
        --text: #000000; --text-muted: #333333;
        --accent: #000000; --accent-soft: rgba(0,0,0,0.05);
        --border: #000000; --border-strong: #000000;
        --positive: #000000; --negative: #000000; --warning: #000000;
        --highlight: #2B5CFF;
        --radius: 0; --radius-lg: 0; --shadow: none;
        --heading-weight: 900; --heading-transform: uppercase;
        --label-transform: uppercase; --label-tracking: 0.1em;
        --label-size: 0.68rem; --label-weight: 400;
        --rule-weight: 3px; --spacing: 2rem;
      }

      body.muji {
        --font-body: -apple-system, 'Helvetica Neue', Arial, sans-serif;
        --font-heading: -apple-system, 'Helvetica Neue', Arial, sans-serif;
        --font-mono: Menlo, Monaco, monospace;
        --font-label: -apple-system, 'Helvetica Neue', Arial, sans-serif;
        --font-size: 14px; --line-height: 1.9; --max-width: 720px;
        --bg: #F9F7F4; --surface: #F2EFE9; --surface-2: #ECE9E2;
        --text: #3D3D3D; --text-muted: #8A8A8A;
        --accent: #C4593C; --accent-soft: rgba(196, 89, 60, 0.05);
        --border: #DDD8D0; --border-strong: #C8C2B8;
        --positive: #5A7A5A; --negative: #9B5A5A; --warning: #8B7A3A;
        --highlight: transparent;
        --radius: 2px; --radius-lg: 3px; --shadow: none;
        --heading-weight: 400; --heading-transform: none;
        --label-transform: normal; --label-tracking: 0.04em;
        --label-size: 0.72rem; --label-weight: 400;
        --rule-weight: 0.5px; --spacing: 3rem;
      }

      body.notion {
        --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --font-heading: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --font-mono: 'SFMono-Regular', Menlo, Consolas, monospace;
        --font-label: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --font-size: 16px; --line-height: 1.6; --max-width: 920px;
        --bg: #FFFFFF; --surface: #F7F6F3; --surface-2: #EFEEEA;
        --text: #37352F; --text-muted: #787774;
        --accent: #2EAADC; --accent-soft: rgba(46, 170, 220, 0.07);
        --border: #E9E9E7; --border-strong: #DDDDD5;
        --positive: #6BC07F; --negative: #E06A6A; --warning: #E9A84A;
        --highlight: transparent;
        --radius: 5px; --radius-lg: 8px; --shadow: none;
        --heading-weight: 600; --heading-transform: none;
        --label-transform: normal; --label-tracking: 0;
        --label-size: 0.78rem; --label-weight: 600;
        --rule-weight: 1px; --spacing: 1.5rem;
      }

      body.grayscale {
        --font-body: -apple-system, 'Helvetica Neue', Arial, sans-serif;
        --font-heading: -apple-system, 'Helvetica Neue', Arial, sans-serif;
        --font-mono: 'SF Mono', Menlo, monospace;
        --font-label: -apple-system, 'Helvetica Neue', Arial, sans-serif;
        --font-size: 15px; --line-height: 1.55; --max-width: 960px;
        --bg: #FFFFFF; --surface: #F5F5F5; --surface-2: #EBEBEB;
        --text: #1A1A1A; --text-muted: #666666;
        --accent: #1A3C6E; --accent-soft: rgba(26, 60, 110, 0.05);
        --border: #E0E0E0; --border-strong: #333333;
        --positive: #1A3C6E; --negative: #8B0000; --warning: #8B6914;
        --highlight: transparent;
        --radius: 2px; --radius-lg: 4px; --shadow: none;
        --heading-weight: 600; --heading-transform: none;
        --label-transform: uppercase; --label-tracking: 0.06em;
        --label-size: 0.7rem; --label-weight: 600;
        --rule-weight: 1px; --spacing: 1.5rem;
      }

      body.glass {
        --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        --font-heading: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        --font-mono: 'SF Mono', 'Fira Code', Consolas, monospace;
        --font-label: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        --font-size: 15px; --line-height: 1.6; --max-width: 1020px;
        --bg: #08080a;
        --surface: rgba(255,255,255,0.04);
        --surface-2: rgba(255,255,255,0.025);
        --text: #E8E8ED; --text-muted: #707080;
        --accent: #a0a0b8; --accent-soft: rgba(160, 160, 184, 0.06);
        --border: rgba(255,255,255,0.07); --border-strong: rgba(255,255,255,0.14);
        --positive: #6EE7B7; --negative: #FCA5A5; --warning: #FCD34D;
        --highlight: transparent;
        --radius: 14px; --radius-lg: 18px;
        --shadow: 0 4px 24px rgba(0,0,0,0.3);
        --heading-weight: 600; --heading-transform: none;
        --label-transform: uppercase; --label-tracking: 0.04em;
        --label-size: 0.7rem; --label-weight: 500;
        --rule-weight: 1px; --spacing: 1.75rem;
      }

      /* ===================== BASE ===================== */

      body {
        font-family: var(--font-body);
        font-size: var(--font-size);
        color: var(--text);
        background: var(--bg);
        line-height: var(--line-height);
        -webkit-font-smoothing: antialiased;
      }

      body.glass {
        background: linear-gradient(160deg, #0a0a0e 0%, #0e0e14 40%, #0a0c10 70%, #080808 100%);
        background-attachment: fixed;
        min-height: 100vh;
      }

      .shell {
        width: min(var(--max-width), calc(100vw - 48px));
        margin: 0 auto;
        padding: 56px 0 80px;
      }

      /* ===================== HERO ===================== */

      .hero {
        margin-bottom: var(--spacing);
      }

      .hero h1 {
        font-family: var(--font-heading);
        font-size: clamp(2rem, 4vw, 3rem);
        font-weight: var(--heading-weight);
        text-transform: var(--heading-transform);
        letter-spacing: -0.025em;
        line-height: 1.08;
        margin-bottom: 10px;
      }

      body.swiss .hero h1 { font-size: clamp(2.5rem, 5.5vw, 4.5rem); letter-spacing: -0.035em; }
      body.brutalist .hero h1 { font-size: clamp(2.2rem, 5vw, 3.8rem); }
      body.muji .hero h1 { font-size: clamp(1.3rem, 2.5vw, 1.8rem); letter-spacing: 0.01em; }

      .hero-sub {
        color: var(--text-muted);
        font-size: 1rem;
        max-width: 55ch;
        margin-bottom: 20px;
      }

      .hero-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        padding: 5px 14px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--text-muted);
        font-family: var(--font-label);
        font-size: 0.76rem;
        font-weight: 500;
        border: 1px solid var(--border);
      }
      body.brutalist .chip { border-radius: 0; border-width: 2px; font-family: var(--font-mono); text-transform: uppercase; }

      /* ===================== WINNER BANNER ===================== */

      .winner-banner {
        margin: var(--spacing) 0;
        padding: 28px 32px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 24px;
        align-items: start;
      }

      /* Rounded themes: no left-border, use top accent line inside */
      body.stripe .winner-banner,
      body.linear .winner-banner,
      body.notion .winner-banner {
        border-top: 2px solid var(--accent);
      }
      body.glass .winner-banner {
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border-color: var(--border-strong);
      }
      /* Flat themes: left-border works naturally */
      body.manuscript .winner-banner,
      body.muji .winner-banner {
        background: transparent; border: none; box-shadow: none;
        border-left: 3px solid var(--accent); padding: 0 0 0 24px;
      }
      body.swiss .winner-banner {
        border: none; border-top: var(--rule-weight) solid var(--border-strong);
        border-radius: 0; background: transparent; padding: 28px 0;
      }
      body.academic .winner-banner {
        border-left: 3px solid var(--accent); border-radius: 0;
      }
      body.grayscale .winner-banner {
        border-left: 3px solid var(--accent); border-radius: 0;
      }
      body.brutalist .winner-banner {
        border-width: 3px; border-left-width: 6px;
      }

      .winner-banner h2 {
        font-family: var(--font-heading);
        font-size: 1.4rem;
        font-weight: var(--heading-weight);
        margin-bottom: 6px;
      }
      .winner-banner .winner-sub { color: var(--text-muted); font-size: 0.9rem; }
      .winner-banner .winner-why {
        margin-top: 12px; font-size: 0.92rem; line-height: 1.6;
      }
      .winner-badge {
        padding: 6px 16px;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        background: var(--accent);
        color: var(--bg);
        white-space: nowrap;
        align-self: start;
      }
      body.brutalist .winner-badge { border-radius: 0; background: var(--highlight); color: #fff; }

      /* ===================== CONTEXT STRIP ===================== */

      .context-strip {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: var(--spacing);
      }
      body.manuscript .context-strip,
      body.muji .context-strip { grid-template-columns: 1fr; gap: var(--spacing); }

      .ctx-section { }
      .ctx-label {
        font-family: var(--font-label);
        font-size: var(--label-size);
        font-weight: var(--label-weight);
        text-transform: var(--label-transform);
        letter-spacing: var(--label-tracking);
        color: var(--text-muted);
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: var(--rule-weight) solid var(--border);
      }
      body.swiss .ctx-label {
        border-bottom-width: var(--rule-weight);
        border-bottom-color: var(--border-strong);
      }

      .ctx-item {
        padding: 8px 0;
        font-size: 0.9rem;
        color: var(--text);
        border-bottom: 1px solid var(--border);
      }
      .ctx-item:last-child { border-bottom: none; }

      .ctx-q { font-weight: 600; font-size: 0.82rem; color: var(--text-muted); margin-bottom: 3px; }
      .ctx-a { font-size: 0.9rem; }

      /* ===================== SCORES GRID ===================== */

      .scores-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 12px;
        margin: 20px 0;
      }

      .score-card {
        padding: 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        text-align: center;
      }
      body.glass .score-card {
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      }
      body.manuscript .score-card,
      body.muji .score-card {
        background: transparent; border: none; box-shadow: none;
        border-bottom: var(--rule-weight) solid var(--border);
        border-radius: 0; text-align: left; padding: 8px 0;
      }
      body.swiss .score-card {
        background: transparent; border: none; border-top: var(--rule-weight) solid var(--border);
        border-radius: 0; text-align: left; padding: 12px 0;
      }
      body.brutalist .score-card { border-width: 2px; }

      .score-num {
        font-family: var(--font-mono);
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--accent);
        line-height: 1;
        margin-bottom: 4px;
      }
      body.manuscript .score-num,
      body.muji .score-num { font-size: 1.3rem; }
      body.swiss .score-num { font-size: 2.2rem; }
      body.brutalist .score-num { font-size: 2.5rem; }

      .score-max {
        font-size: 0.9rem;
        font-weight: 400;
        color: var(--text-muted);
      }

      .score-label {
        font-family: var(--font-label);
        font-size: 0.72rem;
        color: var(--text-muted);
        text-transform: var(--label-transform);
        letter-spacing: var(--label-tracking);
      }

      /* ===================== IDEA CARDS ===================== */

      .idea-card {
        margin-bottom: var(--spacing);
        padding: 32px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
      }
      body.glass .idea-card {
        backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      }
      body.manuscript .idea-card,
      body.muji .idea-card {
        background: transparent; border: none; box-shadow: none;
        border-top: var(--rule-weight) solid var(--border);
        border-radius: 0; padding: var(--spacing) 0;
      }
      body.swiss .idea-card {
        background: transparent; border: none; box-shadow: none;
        border-top: var(--rule-weight) solid var(--border-strong);
        border-radius: 0; padding: var(--spacing) 0;
      }
      body.brutalist .idea-card { border-width: 3px; }

      .idea-card.winner { border-color: var(--accent); }
      body.brutalist .idea-card.winner { background: var(--highlight); color: #fff; }
      body.brutalist .idea-card.winner .idea-sub,
      body.brutalist .idea-card.winner .score-label,
      body.brutalist .idea-card.winner .score-max,
      body.brutalist .idea-card.winner .section-label,
      body.brutalist .idea-card.winner .prose-block h4,
      body.brutalist .idea-card.winner .prose-block p,
      body.brutalist .idea-card.winner .comp-table th,
      body.brutalist .idea-card.winner .comp-table td,
      body.brutalist .idea-card.winner .comp-type,
      body.brutalist .idea-card.winner .risk-card strong,
      body.brutalist .idea-card.winner .risk-card p,
      body.brutalist .idea-card.winner .timeline-day,
      body.brutalist .idea-card.winner .timeline-day strong,
      body.brutalist .idea-card.winner .check-item,
      body.brutalist .idea-card.winner .oss-card,
      body.brutalist .idea-card.winner .oss-signal,
      body.brutalist .idea-card.winner .gtm-main p,
      body.brutalist .idea-card.winner .gtm-channel,
      body.brutalist .idea-card.winner .text-muted { color: rgba(255,255,255,0.85); }
      body.brutalist .idea-card.winner .score-num { color: #fff; }
      body.brutalist .idea-card.winner .score-card,
      body.brutalist .idea-card.winner .timeline-day,
      body.brutalist .idea-card.winner .check-item,
      body.brutalist .idea-card.winner .oss-card,
      body.brutalist .idea-card.winner .risk-card { background: rgba(0,0,0,0.15); border-color: rgba(255,255,255,0.25); }
      body.brutalist .idea-card.winner .comp-table th,
      body.brutalist .idea-card.winner .comp-table td { border-color: rgba(255,255,255,0.25); }
      body.brutalist .idea-card.winner .section-label { border-color: rgba(255,255,255,0.25); }
      body.brutalist .idea-card.winner .badge { background: rgba(0,0,0,0.2); color: #fff; border-color: rgba(255,255,255,0.3); }
      body.brutalist .idea-card.winner .check-box { border-color: rgba(255,255,255,0.6); }

      .idea-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 16px;
        margin-bottom: 8px;
      }

      .idea-header h3 {
        font-family: var(--font-heading);
        font-size: 1.35rem;
        font-weight: var(--heading-weight);
        text-transform: var(--heading-transform);
        letter-spacing: -0.015em;
      }
      body.swiss .idea-header h3 { font-size: 1.8rem; letter-spacing: -0.025em; }
      body.muji .idea-header h3 { font-size: 1.1rem; }

      .idea-sub { color: var(--text-muted); font-size: 0.92rem; margin-bottom: 20px; }

      .badge {
        padding: 5px 14px;
        border-radius: 999px;
        font-family: var(--font-label);
        font-size: 0.73rem;
        font-weight: 600;
        white-space: nowrap;
        background: var(--surface-2);
        border: 1px solid var(--border);
        color: var(--text-muted);
      }
      .badge.winner { background: var(--accent); border-color: var(--accent); color: var(--bg); }
      body.brutalist .badge { border-radius: 0; border-width: 2px; font-family: var(--font-mono); text-transform: uppercase; }
      body.brutalist .badge.winner { background: var(--highlight); color: #fff; border-color: var(--highlight); }

      /* ===================== PROSE BLOCKS (2-col) ===================== */

      .prose-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }
      body.manuscript .prose-grid,
      body.muji .prose-grid { grid-template-columns: 1fr; gap: 16px; }

      .prose-block {}
      .prose-block h4 {
        font-family: var(--font-label);
        font-size: var(--label-size);
        font-weight: var(--label-weight);
        text-transform: var(--label-transform);
        letter-spacing: var(--label-tracking);
        color: var(--text-muted);
        margin-bottom: 6px;
      }
      body.academic .prose-block h4 { font-style: italic; }
      .prose-block p {
        font-size: 0.9rem;
        line-height: 1.6;
      }

      /* ===================== COMPETITORS TABLE ===================== */

      .comp-table {
        width: 100%;
        border-collapse: collapse;
        margin: 16px 0;
        font-size: 0.88rem;
      }
      .comp-table th {
        font-family: var(--font-label);
        font-size: var(--label-size);
        font-weight: var(--label-weight);
        text-transform: var(--label-transform);
        letter-spacing: var(--label-tracking);
        color: var(--text-muted);
        text-align: left;
        padding: 8px 12px;
        border-bottom: var(--rule-weight) solid var(--border-strong);
      }
      body.swiss .comp-table th { border-bottom-width: var(--rule-weight); }
      .comp-table td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }
      .comp-table tr:last-child td { border-bottom: none; }
      .comp-type {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--text-muted);
        font-size: 0.72rem;
        font-weight: 500;
      }
      body.brutalist .comp-type { border-radius: 0; }

      /* ===================== CHECKLIST ===================== */

      .checklist {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin: 12px 0;
      }
      body.manuscript .checklist,
      body.muji .checklist { grid-template-columns: 1fr; }

      .check-item {
        display: flex;
        align-items: start;
        gap: 10px;
        padding: 10px 14px;
        background: var(--surface-2);
        border-radius: var(--radius);
        font-size: 0.88rem;
      }
      body.manuscript .check-item,
      body.muji .check-item { background: transparent; padding: 6px 0; border-radius: 0; }
      body.glass .check-item { background: var(--surface); }

      .check-box {
        flex-shrink: 0;
        width: 18px; height: 18px;
        border: 2px solid var(--border-strong);
        border-radius: 3px;
        margin-top: 1px;
      }
      body.brutalist .check-box { border-radius: 0; border-width: 2px; }

      /* ===================== RISK ITEMS ===================== */

      .risk-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin: 12px 0;
      }
      body.manuscript .risk-row,
      body.muji .risk-row { grid-template-columns: 1fr; }

      .risk-card {
        padding: 14px 16px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
      }
      /* Rounded themes: colored top line */
      body.stripe .risk-card,
      body.linear .risk-card,
      body.notion .risk-card,
      body.glass .risk-card {
        border-top: 2px solid var(--negative);
      }
      /* Flat themes: left-border accent */
      body.swiss .risk-card,
      body.academic .risk-card,
      body.grayscale .risk-card {
        border-left: 3px solid var(--negative);
      }
      body.brutalist .risk-card { border-width: 2px; border-left-width: 4px; border-left-color: var(--negative); }
      body.manuscript .risk-card,
      body.muji .risk-card { border: none; border-left: 2px solid var(--negative); padding: 4px 0 4px 16px; border-radius: 0; }

      .risk-card strong {
        display: block;
        font-size: 0.86rem;
        font-weight: 600;
        color: var(--negative);
        margin-bottom: 4px;
      }
      .risk-card p {
        font-size: 0.84rem;
        color: var(--text-muted);
      }

      /* ===================== TIMELINE ===================== */

      .timeline {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 8px;
        margin: 12px 0;
      }

      .timeline-day {
        padding: 12px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-size: 0.82rem;
      }
      body.glass .timeline-day { background: var(--surface); }
      body.manuscript .timeline-day,
      body.muji .timeline-day {
        background: transparent; border: none; border-left: 2px solid var(--accent);
        border-radius: 0; padding: 4px 0 4px 12px;
      }
      body.swiss .timeline-day,
      body.academic .timeline-day,
      body.grayscale .timeline-day {
        border-top: 2px solid var(--accent); border-radius: 0;
        background: var(--surface);
      }

      .timeline-day strong {
        display: block;
        font-family: var(--font-label);
        font-size: 0.72rem;
        color: var(--accent);
        font-weight: 700;
        margin-bottom: 4px;
        text-transform: var(--label-transform);
        letter-spacing: var(--label-tracking);
      }

      /* ===================== GTM ===================== */

      .gtm-grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 20px;
        margin: 12px 0;
      }
      body.manuscript .gtm-grid,
      body.muji .gtm-grid { grid-template-columns: 1fr; }

      .gtm-main p { font-size: 0.9rem; margin-bottom: 8px; }

      .gtm-channels {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }
      .gtm-channel {
        padding: 4px 12px;
        background: var(--accent-soft);
        border: 1px solid var(--border);
        border-radius: 999px;
        font-size: 0.78rem;
        color: var(--text-muted);
      }
      body.brutalist .gtm-channel { border-radius: 0; border-width: 2px; font-family: var(--font-mono); text-transform: uppercase; }

      /* ===================== SECTION DIVIDER ===================== */

      .section-label {
        font-family: var(--font-label);
        font-size: var(--label-size);
        font-weight: var(--label-weight);
        text-transform: var(--label-transform);
        letter-spacing: var(--label-tracking);
        color: var(--text-muted);
        margin: 24px 0 10px;
        padding-bottom: 6px;
        border-bottom: var(--rule-weight) solid var(--border);
      }
      body.swiss .section-label { border-bottom-color: var(--border-strong); }

      /* ===================== OSS ===================== */

      .oss-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin: 12px 0;
      }
      body.manuscript .oss-grid,
      body.muji .oss-grid { grid-template-columns: 1fr; }

      .oss-card {
        padding: 12px 16px;
        background: var(--surface-2);
        border-radius: var(--radius);
        border: 1px solid var(--border);
      }
      body.manuscript .oss-card,
      body.muji .oss-card {
        background: transparent; border: none;
        border-bottom: var(--rule-weight) solid var(--border);
        border-radius: 0; padding: 8px 0;
      }
      body.glass .oss-card { background: var(--surface); }

      .oss-card strong { font-size: 0.88rem; }
      .oss-card .oss-signal {
        font-size: 0.8rem; color: var(--text-muted); margin-top: 2px;
      }

      /* ===================== FOOTER ===================== */

      .footer {
        margin-top: 56px;
        padding-top: 16px;
        border-top: var(--rule-weight) solid var(--border);
        color: var(--text-muted);
        font-size: 0.76rem;
        text-align: center;
      }
      .footer span { color: var(--accent); font-weight: 500; }

      /* ===================== RESPONSIVE ===================== */

      @media (max-width: 768px) {
        .context-strip,
        .prose-grid,
        .checklist,
        .risk-row,
        .oss-grid,
        .gtm-grid { grid-template-columns: 1fr; }
        .timeline { grid-template-columns: 1fr; }
        .winner-banner { grid-template-columns: 1fr; }
        .shell { padding: 28px 0 48px; }
        .idea-card { padding: 20px; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <h1 id="report-title"></h1>
        <p class="hero-sub" id="report-subtitle"></p>
        <div class="hero-meta" id="hero-meta"></div>
      </section>

      <section class="winner-banner" id="winner-banner" style="display:none">
        <div>
          <h2 id="winner-name"></h2>
          <div class="winner-sub" id="winner-sub"></div>
          <div class="winner-why" id="winner-why"></div>
        </div>
        <span class="winner-badge">Recommended</span>
      </section>

      <section class="context-strip">
        <div class="ctx-section">
          <div class="ctx-label">Context</div>
          <div id="context-summary"></div>
        </div>
        <div class="ctx-section">
          <div class="ctx-label">Key Answers</div>
          <div id="clarifying-answers"></div>
        </div>
      </section>

      <div id="ideas"></div>

      <p class="footer">
        Generated by <a href="https://solana.new" target="_blank" rel="noreferrer" style="color:var(--accent);text-decoration:none;font-weight:500">solana.new</a>
      </p>
    </main>

    <script>
      var D = __DATA_JSON__;
      document.body.className = (D.theme || 'manuscript').toLowerCase().trim();

      function $(id) { return document.getElementById(id); }
      function el(t, c, txt) {
        var n = document.createElement(t);
        if (c) n.className = c;
        if (txt != null) n.textContent = txt;
        return n;
      }

      $('report-title').textContent = D.title || 'Find Next Crypto Idea';
      $('report-subtitle').textContent = D.report_type === 'deep-dive'
        ? 'Deep-dive analysis on the selected idea.'
        : 'Shortlist of defensible crypto ideas from interview and research.';

      var meta = $('hero-meta');
      [D.report_type || 'shortlist', D.generated_at || ''].filter(Boolean)
        .forEach(function(v) { meta.appendChild(el('span', 'chip', v)); });

      /* Winner banner */
      var ideas = D.ideas || [];
      var winner = ideas.find(function(i) { return i.slug === D.recommended_winner; })
        || ideas.find(function(i) { return i.status === 'winner'; });
      if (winner) {
        $('winner-banner').style.display = '';
        $('winner-name').textContent = winner.name;
        $('winner-sub').textContent = winner.one_liner || '';
        $('winner-why').textContent = winner.why_it_wins || '';
      }

      /* Context */
      var ctx = $('context-summary');
      ((D.user_context && D.user_context.summary) || []).forEach(function(s) {
        ctx.appendChild(el('div', 'ctx-item', s));
      });
      if (!ctx.children.length) ctx.appendChild(el('div', 'ctx-item', 'No context provided.'));

      var ans = $('clarifying-answers');
      ((D.user_context && D.user_context.clarifying_answers) || []).forEach(function(qa) {
        var d = el('div', 'ctx-item');
        d.appendChild(el('div', 'ctx-q', qa.question || ''));
        d.appendChild(el('div', 'ctx-a', qa.answer || ''));
        ans.appendChild(d);
      });
      if (!ans.children.length) ans.appendChild(el('div', 'ctx-item', 'No answers captured.'));

      /* Ideas */
      var root = $('ideas');
      ideas.forEach(function(idea) {
        var card = el('article', 'idea-card' + (idea.status === 'winner' ? ' winner' : ''));

        /* Header */
        var hdr = el('div', 'idea-header');
        hdr.appendChild(el('h3', '', idea.name || 'Untitled'));
        hdr.appendChild(el('span', 'badge' + (idea.status === 'winner' ? ' winner' : ''),
          idea.status === 'winner' ? 'Winner' : (idea.status || '#' + (idea.rank || '?'))));
        card.appendChild(hdr);
        card.appendChild(el('div', 'idea-sub', idea.one_liner || ''));

        /* Scores */
        var scores = idea.scores || {};
        var keys = Object.keys(scores);
        if (keys.length) {
          var sg = el('div', 'scores-grid');
          keys.forEach(function(k) {
            var sc = el('div', 'score-card');
            var numWrap = el('div', 'score-num');
            numWrap.textContent = scores[k];
            var maxSpan = el('span', 'score-max', '/3');
            numWrap.appendChild(maxSpan);
            sc.appendChild(numWrap);
            sc.appendChild(el('div', 'score-label', k.replace(/_/g, ' ')));
            sg.appendChild(sc);
          });
          card.appendChild(sg);
        }

        /* Prose 2-col */
        var proseItems = [
          ['Why it wins', idea.why_it_wins],
          ['Why crypto is necessary', idea.why_crypto_is_necessary],
          ['Kill this idea', idea.kill_this_idea],
          ['Why not Web2', idea.why_not_web2]
        ].filter(function(p) { return p[1]; });

        for (var i = 0; i < proseItems.length; i += 2) {
          var pg = el('div', 'prose-grid');
          for (var j = i; j < Math.min(i + 2, proseItems.length); j++) {
            var pb = el('div', 'prose-block');
            pb.appendChild(el('h4', '', proseItems[j][0]));
            pb.appendChild(el('p', '', proseItems[j][1]));
            pg.appendChild(pb);
          }
          card.appendChild(pg);
        }

        /* Competitors */
        if ((idea.competitors || []).length) {
          card.appendChild(el('div', 'section-label', 'Competitors & Substitutes'));
          var tbl = el('table', 'comp-table');
          var thead = el('thead');
          var trh = el('tr');
          ['Name', 'Type', 'Signal', 'Why they haven\u2019t won'].forEach(function(h) {
            trh.appendChild(el('th', '', h));
          });
          thead.appendChild(trh);
          tbl.appendChild(thead);
          var tbody = el('tbody');
          idea.competitors.forEach(function(c) {
            var tr = el('tr');
            tr.appendChild(el('td', '', c.name || ''));
            var tdType = el('td');
            tdType.appendChild(el('span', 'comp-type', c.type || ''));
            tr.appendChild(tdType);
            tr.appendChild(el('td', '', c.signal || ''));
            tr.appendChild(el('td', '', c.why_they_have_not_won || ''));
            tbody.appendChild(tr);
          });
          tbl.appendChild(tbody);
          card.appendChild(tbl);
        }

        /* OSS */
        if ((idea.oss_landscape || []).length) {
          card.appendChild(el('div', 'section-label', 'OSS Landscape'));
          var og = el('div', 'oss-grid');
          idea.oss_landscape.forEach(function(o) {
            var oc = el('div', 'oss-card');
            oc.appendChild(el('strong', '', o.name || ''));
            oc.appendChild(el('div', 'oss-signal', [o.signal, o.notes].filter(Boolean).join(' \u2014 ')));
            og.appendChild(oc);
          });
          card.appendChild(og);
        }

        /* MVP */
        if ((idea.mvp_checklist || []).length) {
          card.appendChild(el('div', 'section-label', '2-Week MVP'));
          var cl = el('div', 'checklist');
          idea.mvp_checklist.forEach(function(item) {
            var ci = el('div', 'check-item');
            ci.appendChild(el('div', 'check-box'));
            ci.appendChild(el('span', '', item));
            cl.appendChild(ci);
          });
          card.appendChild(cl);
        }

        /* Risks */
        if ((idea.risks || []).length) {
          card.appendChild(el('div', 'section-label', 'Risks'));
          var rr = el('div', 'risk-row');
          idea.risks.forEach(function(r) {
            var rc = el('div', 'risk-card');
            rc.appendChild(el('strong', '', r.risk || ''));
            if (r.mitigation) rc.appendChild(el('p', '', r.mitigation));
            rr.appendChild(rc);
          });
          card.appendChild(rr);
        }

        /* Validation sprint */
        if ((idea.validation_sprint || []).length) {
          card.appendChild(el('div', 'section-label', '7-Day Validation Sprint'));
          var tl = el('div', 'timeline');
          idea.validation_sprint.forEach(function(d) {
            var td = el('div', 'timeline-day');
            td.appendChild(el('strong', '', 'Day ' + (d.day || '?')));
            td.appendChild(el('span', '', d.task || ''));
            tl.appendChild(td);
          });
          card.appendChild(tl);
        }

        /* GTM */
        if (idea.gtm) {
          card.appendChild(el('div', 'section-label', 'Go-to-Market'));
          var gg = el('div', 'gtm-grid');
          var gm = el('div', 'gtm-main');
          if (idea.gtm.wedge) gm.appendChild(el('p', '', idea.gtm.wedge));
          if (idea.gtm.first_ten_users) {
            var fp = el('p', '');
            fp.appendChild(el('strong', '', 'First 10 users: '));
            fp.appendChild(document.createTextNode(idea.gtm.first_ten_users));
            gm.appendChild(fp);
          }
          if (idea.gtm.message_angle) {
            var mp = el('p', '');
            mp.appendChild(el('strong', '', 'Message: '));
            mp.appendChild(document.createTextNode(idea.gtm.message_angle));
            gm.appendChild(mp);
          }
          gg.appendChild(gm);

          if ((idea.gtm.channels || []).length) {
            var chs = el('div', '');
            var chLabel = el('div', 'section-label', 'Channels');
            chLabel.style.marginTop = '0';
            chs.appendChild(chLabel);
            var chWrap = el('div', 'gtm-channels');
            idea.gtm.channels.forEach(function(ch) {
              chWrap.appendChild(el('span', 'gtm-channel', ch));
            });
            chs.appendChild(chWrap);
            gg.appendChild(chs);
          }
          card.appendChild(gg);
        }

        root.appendChild(card);
      });
    </script>
  </body>
</html>
