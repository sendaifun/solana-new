<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__TITLE__</title>
    <style>
      :root {
        --bg: #1a2230;
        --surface: #27374D;
        --surface-2: #2f4158;
        --border: rgba(157, 178, 191, 0.12);
        --border-accent: rgba(82, 109, 130, 0.5);
        --text: #DDE6ED;
        --text-muted: #9DB2BF;
        --accent: #526D82;
        --accent-soft: rgba(82, 109, 130, 0.15);
        --green: #9DB2BF;
        --green-soft: rgba(157, 178, 191, 0.12);
        --yellow: #9DB2BF;
        --yellow-soft: rgba(157, 178, 191, 0.12);
        --red: #8a6a6e;
        --red-soft: rgba(138, 106, 110, 0.15);
        --radius: 12px;
        --radius-lg: 16px;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
        color: var(--text);
        background: var(--bg);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      .shell {
        width: min(1100px, calc(100vw - 48px));
        margin: 0 auto;
        padding: 40px 0 64px;
      }

      .hero {
        padding: 32px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        margin-bottom: 24px;
      }

      .hero h1 {
        font-size: clamp(1.75rem, 3.5vw, 2.5rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.1;
        margin-bottom: 8px;
      }

      .hero p {
        color: var(--text-muted);
        font-size: 0.95rem;
        max-width: 60ch;
      }

      .hero-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 16px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        padding: 6px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.8rem;
        font-weight: 500;
        letter-spacing: 0.01em;
        border: 1px solid rgba(20, 184, 166, 0.15);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 16px;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 24px;
      }

      .panel h2 {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        margin-bottom: 16px;
      }

      .stack { display: grid; gap: 8px; }

      .item {
        padding: 12px 14px;
        border-radius: var(--radius);
        background: var(--surface-2);
        border: 1px solid var(--border);
        font-size: 0.9rem;
      }

      .item strong {
        display: block;
        font-size: 0.8rem;
        color: var(--text-muted);
        font-weight: 500;
        margin-bottom: 4px;
      }

      .idea-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 24px;
        margin-bottom: 16px;
      }

      .idea-card.winner {
        border-color: var(--border-accent);
      }

      .idea-head {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 16px;
        margin-bottom: 16px;
      }

      .idea-head h3 {
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .idea-sub {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-top: 2px;
      }

      .badge {
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 600;
        white-space: nowrap;
        background: var(--surface-2);
        border: 1px solid var(--border);
        color: var(--text-muted);
      }

      .badge.winner {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--bg);
      }

      .score-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 16px;
      }

      .score {
        padding: 4px 10px;
        border-radius: 8px;
        font-size: 0.8rem;
        font-weight: 500;
        font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        background: var(--green-soft);
        color: var(--green);
        border: 1px solid rgba(34, 197, 94, 0.15);
      }

      .section-block {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid var(--border);
      }

      .section-block h4 {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        margin-bottom: 8px;
      }

      .section-block p,
      .section-block ul {
        color: var(--text);
        font-size: 0.9rem;
      }

      .section-block ul {
        padding-left: 18px;
      }

      .section-block li {
        margin-bottom: 6px;
      }

      .comp-item {
        padding: 10px 12px;
        border-radius: var(--radius);
        background: var(--surface-2);
        border: 1px solid var(--border);
        margin-bottom: 6px;
        font-size: 0.88rem;
      }

      .comp-item strong {
        display: block;
        font-weight: 600;
        margin-bottom: 2px;
      }

      .comp-item div {
        color: var(--text-muted);
        font-size: 0.84rem;
      }

      .check-item {
        padding: 8px 12px;
        border-radius: var(--radius);
        background: var(--surface-2);
        border: 1px solid var(--border);
        font-size: 0.88rem;
        font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      }

      .timeline-item {
        padding: 10px 12px;
        border-radius: var(--radius);
        background: var(--surface-2);
        border: 1px solid var(--border);
        margin-bottom: 6px;
      }

      .timeline-item strong {
        font-size: 0.8rem;
        color: var(--accent);
        font-weight: 600;
      }

      .timeline-item div {
        font-size: 0.88rem;
        margin-top: 2px;
      }

      .risk-item {
        padding: 10px 12px;
        border-radius: var(--radius);
        background: var(--red-soft);
        border: 1px solid rgba(239, 68, 68, 0.15);
        margin-bottom: 6px;
      }

      .risk-item strong {
        display: block;
        color: var(--red);
        font-size: 0.84rem;
        font-weight: 600;
      }

      .risk-item div {
        color: var(--text-muted);
        font-size: 0.84rem;
        margin-top: 2px;
      }

      .footer-note {
        margin-top: 32px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
        color: var(--text-muted);
        font-size: 0.8rem;
        text-align: center;
      }

      .footer-note span {
        color: var(--accent);
      }

      @media (max-width: 768px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <h1 id="report-title"></h1>
        <p id="report-subtitle"></p>
        <div class="hero-meta" id="hero-meta"></div>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>User Context</h2>
          <div class="stack" id="context-summary"></div>
        </article>

        <article class="panel">
          <h2>Clarifying Answers</h2>
          <div class="stack" id="clarifying-answers"></div>
        </article>
      </section>

      <div id="ideas"></div>

      <section class="panel" style="margin-top:16px">
        <h2>Why The Winner Wins</h2>
        <div class="stack" id="winner-summary"></div>
      </section>

      <p class="footer-note">
        Generated by <span>superstack</span> &middot; Offline-safe &middot; Review outside chat
      </p>
    </main>

    <script>
      const REPORT_DATA = __DATA_JSON__;

      const qs = (id) => document.getElementById(id);

      function el(tag, className, text) {
        const node = document.createElement(tag);
        if (className) node.className = className;
        if (text !== undefined && text !== null) node.textContent = text;
        return node;
      }

      function appendList(container, items) {
        if (!items || !items.length) return;
        const ul = el("ul");
        items.forEach((item) => ul.appendChild(el("li", "", item)));
        container.appendChild(ul);
      }

      qs("report-title").textContent = REPORT_DATA.title || "Find Next Crypto Idea";
      qs("report-subtitle").textContent =
        REPORT_DATA.report_type === "deep-dive"
          ? "Deep dive on the selected crypto startup idea."
          : "Shortlist of the most defensible crypto ideas based on interview and research.";

      const meta = qs("hero-meta");
      [
        REPORT_DATA.report_type || "shortlist",
        REPORT_DATA.generated_at || "",
        REPORT_DATA.recommended_winner ? `winner: ${REPORT_DATA.recommended_winner}` : "",
      ]
        .filter(Boolean)
        .forEach((value) => meta.appendChild(el("span", "chip", value)));

      const summary = qs("context-summary");
      (REPORT_DATA.user_context?.summary || []).forEach((item) => {
        summary.appendChild(el("div", "item", item));
      });
      if (!summary.children.length) {
        summary.appendChild(el("div", "item", "No user context summary provided."));
      }

      const answers = qs("clarifying-answers");
      (REPORT_DATA.user_context?.clarifying_answers || []).forEach((item) => {
        const wrap = el("div", "item");
        wrap.appendChild(el("strong", "", item.question || "Question"));
        wrap.appendChild(el("div", "", item.answer || ""));
        answers.appendChild(wrap);
      });
      if (!answers.children.length) {
        answers.appendChild(el("div", "item", "No clarifying answers captured."));
      }

      const ideas = REPORT_DATA.ideas || [];
      const ideasRoot = qs("ideas");

      ideas.forEach((idea) => {
        const card = el("article", `idea-card ${idea.status === "winner" ? "winner" : ""}`.trim());

        const head = el("div", "idea-head");
        const left = el("div");
        left.appendChild(el("h3", "", idea.name || "Untitled idea"));
        left.appendChild(el("div", "idea-sub", idea.one_liner || ""));
        head.appendChild(left);
        head.appendChild(el("span", `badge ${idea.status === "winner" ? "winner" : ""}`.trim(), idea.status || `rank ${idea.rank || ""}`));
        card.appendChild(head);

        const scoreRow = el("div", "score-row");
        Object.entries(idea.scores || {}).forEach(([key, value]) => {
          scoreRow.appendChild(el("span", "score", `${key}: ${value}`));
        });
        if (scoreRow.children.length) card.appendChild(scoreRow);

        const blocks = [
          ["Why it wins", idea.why_it_wins],
          ["Why crypto is necessary", idea.why_crypto_is_necessary],
          ["Kill this idea", idea.kill_this_idea],
          ["Why not Web2", idea.why_not_web2],
        ];
        blocks.forEach(([title, body]) => {
          if (!body) return;
          const wrap = el("section", "section-block");
          wrap.appendChild(el("h4", "", title));
          wrap.appendChild(el("p", "", body));
          card.appendChild(wrap);
        });

        if ((idea.competitors || []).length) {
          const wrap = el("section", "section-block");
          wrap.appendChild(el("h4", "", "Competitors & Substitutes"));
          idea.competitors.forEach((item) => {
            const row = el("div", "comp-item");
            row.appendChild(el("strong", "", `${item.name || "Unknown"}${item.type ? ` · ${item.type}` : ""}`));
            if (item.signal) row.appendChild(el("div", "", item.signal));
            if (item.why_they_have_not_won) row.appendChild(el("div", "", `Why they haven't won: ${item.why_they_have_not_won}`));
            wrap.appendChild(row);
          });
          card.appendChild(wrap);
        }

        if ((idea.oss_landscape || []).length) {
          const wrap = el("section", "section-block");
          wrap.appendChild(el("h4", "", "OSS Landscape"));
          idea.oss_landscape.forEach((item) => {
            const row = el("div", "comp-item");
            row.appendChild(el("strong", "", item.name || "Unknown repo"));
            if (item.signal) row.appendChild(el("div", "", item.signal));
            if (item.notes) row.appendChild(el("div", "", item.notes));
            wrap.appendChild(row);
          });
          card.appendChild(wrap);
        }

        if ((idea.mvp_checklist || []).length) {
          const wrap = el("section", "section-block");
          wrap.appendChild(el("h4", "", "2-Week MVP"));
          const list = el("div", "stack");
          idea.mvp_checklist.forEach((item) => {
            list.appendChild(el("div", "check-item", `[ ] ${item}`));
          });
          wrap.appendChild(list);
          card.appendChild(wrap);
        }

        if ((idea.risks || []).length) {
          const wrap = el("section", "section-block");
          wrap.appendChild(el("h4", "", "Risks"));
          idea.risks.forEach((item) => {
            const row = el("div", "risk-item");
            row.appendChild(el("strong", "", item.risk || "Risk"));
            if (item.mitigation) row.appendChild(el("div", "", `Mitigation: ${item.mitigation}`));
            wrap.appendChild(row);
          });
          card.appendChild(wrap);
        }

        if ((idea.validation_sprint || []).length) {
          const wrap = el("section", "section-block");
          wrap.appendChild(el("h4", "", "7-Day Validation Sprint"));
          idea.validation_sprint.forEach((item) => {
            const row = el("div", "timeline-item");
            row.appendChild(el("strong", "", `Day ${item.day || "?"}`));
            row.appendChild(el("div", "", item.task || ""));
            wrap.appendChild(row);
          });
          card.appendChild(wrap);
        }

        if (idea.gtm) {
          const wrap = el("section", "section-block");
          wrap.appendChild(el("h4", "", "GTM Wedge"));
          if (idea.gtm.wedge) wrap.appendChild(el("p", "", idea.gtm.wedge));
          appendList(wrap, idea.gtm.channels || []);
          if (idea.gtm.first_ten_users) wrap.appendChild(el("p", "", `First ten users: ${idea.gtm.first_ten_users}`));
          if (idea.gtm.message_angle) wrap.appendChild(el("p", "", `Message angle: ${idea.gtm.message_angle}`));
          card.appendChild(wrap);
        }

        ideasRoot.appendChild(card);
      });

      const winner = ideas.find((idea) => idea.slug === REPORT_DATA.recommended_winner) ||
        ideas.find((idea) => idea.status === "winner");
      const winnerSummary = qs("winner-summary");
      if (winner) {
        [
          ["Winner", winner.name],
          ["Why it won", winner.why_it_wins],
          ["Why crypto matters", winner.why_crypto_is_necessary],
        ].forEach(([label, value]) => {
          const row = el("div", "item");
          row.appendChild(el("strong", "", label));
          row.appendChild(el("div", "", value || ""));
          winnerSummary.appendChild(row);
        });
      } else {
        winnerSummary.appendChild(el("div", "item", "No winner selected yet."));
      }
    </script>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
