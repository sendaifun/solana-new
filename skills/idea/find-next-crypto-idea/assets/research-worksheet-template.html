<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__TITLE__</title>
    <style>
      :root {
        --bg: #181c22;
        --surface: #222831;
        --surface-2: #2a3040;
        --border: rgba(221, 221, 221, 0.08);
        --text: #DDDDDD;
        --text-muted: #7a8494;
        --accent: #30475E;
        --accent-soft: rgba(48, 71, 94, 0.2);
        --radius: 12px;
        --radius-lg: 16px;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
        color: var(--text);
        background: var(--bg);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      .shell {
        width: min(1100px, calc(100vw - 48px));
        margin: 0 auto;
        padding: 40px 0 64px;
      }

      .hero {
        padding: 32px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        margin-bottom: 24px;
      }

      .hero h1 {
        font-size: clamp(1.75rem, 3.5vw, 2.5rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.1;
        margin-bottom: 8px;
      }

      .hero p {
        color: var(--text-muted);
        font-size: 0.95rem;
        max-width: 60ch;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 16px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(48, 71, 94, 0.25);
        color: #DDDDDD;
        font-size: 0.8rem;
        font-weight: 500;
        border: 1px solid rgba(48, 71, 94, 0.4);
      }

      .idea {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 24px;
        margin-bottom: 16px;
      }

      .idea h2 {
        font-size: 1.15rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin-bottom: 4px;
      }

      .idea > p {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-bottom: 16px;
      }

      .columns {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .block {
        padding: 14px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--surface-2);
      }

      .block h3 {
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        margin-bottom: 10px;
      }

      ul {
        padding-left: 16px;
      }

      li {
        margin: 0 0 8px;
        font-size: 0.88rem;
      }

      a {
        color: #F05454;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .note {
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: var(--radius);
        border: 1px dashed rgba(255, 255, 255, 0.1);
        color: var(--text-muted);
        background: var(--surface-2);
        font-size: 0.84rem;
      }

      .note strong {
        color: #F05454;
      }

      .footer-note {
        margin-top: 32px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
        color: var(--text-muted);
        font-size: 0.8rem;
        text-align: center;
      }

      .footer-note span {
        color: #F05454;
      }

      @media (max-width: 768px) {
        .columns { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <h1 id="title"></h1>
        <p id="subtitle"></p>
        <div class="meta" id="meta"></div>
      </section>
      <section id="ideas"></section>
      <p class="footer-note">
        Generated by <span>superstack</span> &middot; Click highest-signal queries first
      </p>
    </main>

    <script>
      const PACK = __DATA_JSON__;

      function el(tag, className, text) {
        const node = document.createElement(tag);
        if (className) node.className = className;
        if (text !== undefined && text !== null) node.textContent = text;
        return node;
      }

      function queryList(items) {
        const list = el("ul");
        items.forEach((item) => {
          const li = el("li");
          const a = document.createElement("a");
          a.href = item.url;
          a.target = "_blank";
          a.rel = "noreferrer";
          a.textContent = item.query;
          li.appendChild(a);
          if (item.reason) {
            li.appendChild(document.createTextNode(` — ${item.reason}`));
          }
          list.appendChild(li);
        });
        return list;
      }

      document.getElementById("title").textContent = "Live Research Worksheet";
      document.getElementById("subtitle").textContent =
        "Browser-first for X, web-first for everything else. Click the highest-signal queries first.";

      const meta = document.getElementById("meta");
      [
        PACK.generated_at,
        `browser: ${PACK.open_request?.browser || "default"}`,
        `sources: ${(PACK.open_request?.sources || []).join(", ") || "none"}`
      ]
        .filter(Boolean)
        .forEach((value) => meta.appendChild(el("span", "chip", value)));

      const root = document.getElementById("ideas");
      (PACK.ideas || []).forEach((idea) => {
        const card = el("article", "idea");
        card.appendChild(el("h2", "", idea.name || "Untitled idea"));
        card.appendChild(el("p", "", idea.one_liner || ""));

        const cols = el("div", "columns");
        [
          ["X Queries", idea.search_plan?.x || []],
          ["GitHub Queries", idea.search_plan?.github || []],
          ["Web Queries", idea.search_plan?.web || []]
        ].forEach(([label, items]) => {
          const block = el("section", "block");
          block.appendChild(el("h3", "", label));
          if (items.length) {
            block.appendChild(queryList(items));
          } else {
            block.appendChild(el("div", "", "No queries generated."));
          }
          cols.appendChild(block);
        });
        card.appendChild(cols);

        const note = el("div", "note");
        note.innerHTML =
          "<strong>Capture next:</strong> direct competitors, adjacent substitutes, OSS repos, complaint signals, and why-now signals.";
        card.appendChild(note);
        root.appendChild(card);
      });
    </script>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
